# Generic Documentation Schema
# This schema MUST be validated before writing any documentation file
# Language-specific details should be captured in the documentation body

required_fields:
  module:
    type: string
    description: "Module/area of the system (e.g., 'Email Processing', 'Authentication', 'Data Pipeline')"
    examples:
      - "Email Processing"
      - "Authentication"
      - "Data Pipeline"
      - "User Interface"

  date:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
    description: "Date when this problem was solved (YYYY-MM-DD)"

  problem_type:
    type: enum
    values:
      - build_error          # Compilation, build system errors
      - test_failure         # Test failures, flaky tests
      - runtime_error        # Exceptions, crashes during execution
      - performance_issue    # Slow performance, memory issues, resource leaks
      - data_issue           # Database, serialization, data structure problems
      - security_issue       # Authentication, authorization, injection attacks
      - ui_bug               # Frontend, interface issues
      - integration_issue    # External service, API integration problems
      - logic_error          # Business logic, algorithm bugs
      - developer_experience # DX issues: workflow, tooling, setup
      - workflow_issue       # Process, missing steps, unclear practices
      - best_practice        # Documenting patterns to follow
      - documentation_gap    # Missing or inadequate documentation
    description: "Primary category of the problem"

  severity:
    type: enum
    values:
      - critical             # Blocks production or development
      - high                 # Impairs core functionality
      - medium               # Affects specific feature
      - low                  # Minor issue or edge case
    description: "Impact severity"

  tags:
    type: array[string]
    min_items: 1
    max_items: 8
    description: "Searchable keywords (lowercase, hyphen-separated)"
    examples:
      - "memory-leak"
      - "race-condition"
      - "type-error"
      - "async-bug"

optional_fields:
  language:
    type: enum
    values:
      - cpp
      - python
      - rust
      - javascript
      - typescript
      - go
      - java
      - ruby
    description: "Programming language (optional, used for template selection)"

validation_rules:
  - "module must be a descriptive name"
  - "date must be in YYYY-MM-DD format"
  - "problem_type must match one of the enum values"
  - "severity must match one of the enum values"
  - "tags must be lowercase, hyphen-separated, min 1 item"
  - "language must match one of the enum values (if provided)"
  - "All language-specific details (component, root cause, resolution type) should be documented in the body, not in YAML"

# Example valid front matter (C++):
# ---
# module: Memory Management
# date: 2025-11-12
# problem_type: runtime_error
# severity: critical
# language: cpp
# tags: [memory-leak, dangling-pointer, ownership]
# ---
#
# Example valid front matter (Python):
# ---
# module: Data Processing Pipeline
# date: 2025-11-13
# problem_type: performance_issue
# severity: high
# language: python
# tags: [async, concurrency, performance]
# ---
#
# Example valid front matter (Rust):
# ---
# module: API Integration
# date: 2025-11-14
# problem_type: build_error
# severity: medium
# language: rust
# tags: [borrow-checker, lifetime, trait]
# ---
#
# Example valid front matter (generic, no language):
# ---
# module: Documentation Workflow
# date: 2025-11-15
# problem_type: workflow_issue
# severity: low
# tags: [workflow, documentation, process]
# ---
